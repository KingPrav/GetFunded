<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VC Brain — sourcing to decision</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#E7EEF6; --panel:#FFFFFF; --panel-2:#F4F8FC;
  --ink:#12384E; --ink-2:#4A6478; --ink-3:#7D93A4;
  --rule:#CBDBE9; --rule-2:#E3ECF4;
  --live:#1B7F5A; --soft:#B8791E; --alarm:#A93226; --unknown:#9AAAB8;
  --beam:#1E7FBF;
  --r:3px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--paper); color:var(--ink);
  font:400 14px/1.5 "Source Sans 3",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:Archivo,sans-serif;margin:0;letter-spacing:-.015em}
.mono{font-family:"IBM Plex Mono",monospace;font-variant-numeric:tabular-nums}
button{font:inherit;cursor:pointer}
a{color:var(--beam)}

/* shell */
.shell{display:grid;grid-template-columns:200px 1fr;min-height:100vh}
.rail{background:var(--ink);color:#C9DCEA;padding:18px 0;position:sticky;top:0;height:100vh;overflow:auto}
.brand{padding:0 18px 16px;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:12px}
.brand h1{font-size:15px;color:#fff;font-weight:700;letter-spacing:.02em}
.brand p{margin:3px 0 0;font-size:10.5px;color:#7FA3BC;letter-spacing:.09em;text-transform:uppercase;font-family:"IBM Plex Mono",monospace}
.navbtn{display:block;width:100%;text-align:left;background:none;border:0;color:#B4CFE2;padding:8px 18px;font-size:13.5px;border-left:2px solid transparent}
.navbtn:hover{color:#fff;background:rgba(255,255,255,.05)}
.navbtn[aria-current="true"]{color:#fff;border-left-color:var(--beam);background:rgba(30,127,191,.16);font-weight:600}
.navsec{padding:14px 18px 5px;font:600 9.5px/1 "IBM Plex Mono",monospace;letter-spacing:.14em;text-transform:uppercase;color:#5F87A3}
.railfoot{padding:16px 18px;margin-top:10px;border-top:1px solid rgba(255,255,255,.12);font-size:11px;color:#6E93AC;line-height:1.45}

.main{padding:22px 26px 60px;max-width:1500px}
.head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:16px}
.head h2{font-size:22px;font-weight:700}
.head p{margin:5px 0 0;color:var(--ink-2);max-width:66ch;font-size:13.5px}

.card{background:var(--panel);border:1px solid var(--rule);border-radius:var(--r);padding:14px 16px}
.grid{display:grid;gap:12px}
.eyebrow{font:600 9.5px/1 "IBM Plex Mono",monospace;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-3)}

/* ===== signature: evidence bar ===== */
.ev{margin:9px 0 11px}
.ev-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:4px}
.ev-name{font:600 11.5px/1 "IBM Plex Mono",monospace;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-2)}
.ev-val{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:16px}
.ev-track{height:11px;background:var(--rule-2);border-radius:1px;display:flex;overflow:hidden}
.ev-seg{height:100%}
.s-verified{background:var(--live)}
.s-self{background:var(--soft)}
.s-contra{background:var(--alarm)}
.ev-cov{height:5px;margin-top:3px;display:flex;border-radius:1px;overflow:hidden;background:transparent}
.cov-known{background:var(--ink-3)}
.cov-unknown{background-image:repeating-linear-gradient(135deg,var(--rule) 0 3px,transparent 3px 6px);border:1px solid var(--rule)}
.ev-foot{display:flex;justify-content:space-between;font:400 10.5px/1.4 "IBM Plex Mono",monospace;color:var(--ink-3);margin-top:4px}
.trend{font-weight:600}
.t-improving{color:var(--live)} .t-declining{color:var(--alarm)} .t-stable{color:var(--ink-3)}

.legend{display:flex;gap:14px;flex-wrap:wrap;font:400 11px/1 "IBM Plex Mono",monospace;color:var(--ink-2);margin-top:6px}
.legend i{width:10px;height:10px;display:inline-block;margin-right:5px;vertical-align:-1px;border-radius:1px}

/* filters */
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
input[type=text],select{font:inherit;padding:6px 9px;border:1px solid var(--rule);border-radius:var(--r);background:#fff;color:var(--ink);min-width:0}
input[type=text]:focus,select:focus,button:focus-visible{outline:2px solid var(--beam);outline-offset:1px}
.q{flex:1;min-width:260px;font-family:"IBM Plex Mono",monospace;font-size:12.5px}
.chip{border:1px solid var(--rule);background:#fff;border-radius:20px;padding:4px 11px;font-size:12px;color:var(--ink-2)}
.chip[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}

/* deal cards */
.deals{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.deal{background:var(--panel);border:1px solid var(--rule);border-radius:var(--r);padding:13px 15px;text-align:left;width:100%;transition:border-color .12s,transform .12s}
.deal:hover{border-color:var(--beam);transform:translateY(-1px)}
.deal-h{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.deal-h h3{font-size:15px}
.deal-sub{font:400 11px/1.4 "IBM Plex Mono",monospace;color:var(--ink-3);margin-top:2px}
.tag{font:600 9.5px/1 "IBM Plex Mono",monospace;letter-spacing:.08em;text-transform:uppercase;padding:3px 6px;border-radius:2px;white-space:nowrap}
.tag-invest{background:#E1F2EA;color:#14614A}
.tag-cond{background:#E4EFF8;color:#175A85}
.tag-track{background:#F4EDDD;color:#8A6516}
.tag-pass{background:#EFF2F5;color:#68798A}
.tag-hold{background:#F8E5E2;color:#8E2E24}
.cold{background:#12384E;color:#fff}

/* tables */
table{border-collapse:collapse;width:100%;font-size:12.5px}
th{text-align:left;font:600 9.5px/1 "IBM Plex Mono",monospace;letter-spacing:.11em;text-transform:uppercase;color:var(--ink-3);padding:7px 8px;border-bottom:1px solid var(--rule);position:sticky;top:0;background:var(--panel)}
td{padding:7px 8px;border-bottom:1px solid var(--rule-2);vertical-align:top}
tr:hover td{background:var(--panel-2)}
.pill{font:600 9.5px/1 "IBM Plex Mono",monospace;letter-spacing:.06em;text-transform:uppercase;padding:3px 5px;border-radius:2px;white-space:nowrap}
.p-verified{background:#E1F2EA;color:#14614A}
.p-self_asserted{background:#F6EEDC;color:#7E5A12}
.p-contradicted{background:#F8E5E2;color:#8E2E24}
.p-unobserved{background:#EDF1F5;color:#66798A}
.p-gap_flagged{background:#E9EDF1;color:#4A6478;border:1px dashed var(--ink-3)}

/* tabs */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--rule);margin:16px 0 14px;flex-wrap:wrap}
.tab{background:none;border:0;border-bottom:2px solid transparent;padding:8px 13px;color:var(--ink-2);font-size:13px}
.tab[aria-selected="true"]{color:var(--ink);border-bottom-color:var(--ink);font-weight:600}

/* canvas */
.bmc{display:grid;grid-template-columns:repeat(5,1fr);grid-auto-rows:minmax(88px,auto);gap:6px}
.bmc div{border:1px solid var(--rule);border-radius:var(--r);padding:9px 10px;background:var(--panel)}
.bmc .miss{background:repeating-linear-gradient(135deg,#F2F6FA 0 6px,#fff 6px 12px);border-style:dashed;color:var(--ink-3)}
.bmc h5{margin:0 0 5px;font:600 9.5px/1 "IBM Plex Mono",monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3)}
.bmc p{margin:0;font-size:12.5px;line-height:1.4}
.b1{grid-column:span 1}.b2{grid-column:span 2}

/* penetration chart */
.pen{position:relative;height:230px;border-left:1px solid var(--rule);border-bottom:1px solid var(--rule);margin:10px 0 6px}
.pt{position:absolute;transform:translate(-50%,50%);width:11px;height:11px;border-radius:50%;border:1.5px solid #fff}
.pt-direct{background:var(--alarm)} .pt-indirect{background:var(--ink-3)} .pt-you{background:var(--beam);width:15px;height:15px}
.pt-lab{position:absolute;transform:translate(-50%,50%);font:400 10px/1 "IBM Plex Mono",monospace;color:var(--ink-2);white-space:nowrap;margin-left:11px}
.axlab{font:400 10px/1 "IBM Plex Mono",monospace;color:var(--ink-3)}

.memo{background:var(--panel);border:1px solid var(--rule);border-radius:var(--r);padding:22px 26px;max-width:78ch}
.memo h3{font-size:17px;margin:20px 0 7px;padding-bottom:5px;border-bottom:1px solid var(--rule-2)}
.memo h3:first-child{margin-top:0}
.memo p{margin:0 0 9px}
.memo ul{margin:0 0 10px;padding-left:19px}
.memo li{margin-bottom:4px}
.memo .gap{color:var(--ink-3);font-family:"IBM Plex Mono",monospace;font-size:12px}
.cite{font:400 10.5px/1 "IBM Plex Mono",monospace;color:var(--ink-3);background:var(--panel-2);padding:1px 4px;border-radius:2px;border:1px solid var(--rule-2)}

.split{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.kv{display:flex;justify-content:space-between;gap:10px;padding:5px 0;border-bottom:1px solid var(--rule-2);font-size:12.5px}
.kv b{font-family:"IBM Plex Mono",monospace;font-weight:600}
.note{font-size:12px;color:var(--ink-2);background:var(--panel-2);border-left:2px solid var(--beam);padding:9px 12px;border-radius:0 var(--r) var(--r) 0}
.warn{border-left-color:var(--soft);background:#FBF6EA}
.btn{background:var(--ink);color:#fff;border:0;border-radius:var(--r);padding:7px 14px;font-size:13px;font-weight:500}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--rule)}
.btn:hover{opacity:.9}
textarea{width:100%;min-height:150px;font:inherit;padding:11px;border:1px solid var(--rule);border-radius:var(--r);resize:vertical;font-size:13px;line-height:1.5}
.empty{padding:40px 20px;text-align:center;color:var(--ink-2);border:1px dashed var(--rule);border-radius:var(--r);background:var(--panel-2)}
.spark{display:inline-flex;align-items:flex-end;gap:2px;height:15px;vertical-align:-2px;margin-left:6px}
.spark i{width:4px;background:var(--ink-3);border-radius:1px}
@media(max-width:900px){.shell{grid-template-columns:1fr}.rail{position:static;height:auto}.bmc{grid-template-columns:repeat(2,1fr)}.b2{grid-column:span 2}.split{grid-template-columns:1fr}}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

const $ = (h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstChild};

/* Financials are a state, not an assumption. Undisclosed means no number, only an ask. */
const disclosed = d => d.al.disc === 'disclosed' || S.submitted.has(d.cid);
const requested = d => S.requested.has(d.cid);

/* Recompute the Founder Score from whichever components are actually in play.
   With no financials, capital discipline is unobserved, so it drops out and the band widens. */
function fscore(d){
  const parts = d.fsb.parts.filter(([n,v,w,c]) => v!=null && (disclosed(d) || n!=='Capital discipline'));
  const used  = d.fsb.parts.filter(([n]) => disclosed(d) || n!=='Capital discipline');
  if(!parts.length) return {p:null, hw:22, lo:0, hi:100, cov:0, parts:used};
  const den = parts.reduce((a,[,,w])=>a+w,0);
  const p   = parts.reduce((a,[,v,w])=>a+w*v,0)/den;
  const cov = Math.round(used.reduce((a,[,,,c])=>a+c,0)/used.length);
  const hw  = Math.round((2 + (100-cov)*0.20)*10)/10;
  return {p:Math.round(p*10)/10, hw, lo:Math.round(Math.max(0,p-hw)*10)/10,
          hi:Math.round(Math.min(100,p+hw)*10)/10, cov, parts:used};
}

/* ---------- signature component: the evidence bar ---------- */
function stateMix(d, axis){
  const cs = d.claims.filter(c=>c.ax===axis && c.st!=='unobserved' && c.st!=='gap_flagged');
  const tot = cs.length || 1;
  return {v:cs.filter(c=>c.st==='verified').length/tot,
          s:cs.filter(c=>c.st==='self_asserted').length/tot,
          x:cs.filter(c=>c.st==='contradicted').length/tot, n:cs.length};
}
function evBar(d, axis, opt={}){
  const a = d.axes[axis]; if(!a) return '';
  const m = stateMix(d, axis), sc = a.s ?? 0;
  const seg = (f,cls)=>`<div class="ev-seg ${cls}" style="width:${(sc*f).toFixed(1)}%"></div>`;
  const spark = a.h.map(h=>`<i style="height:${Math.max(2,(h||0)*0.15)}px"></i>`).join('');
  return `<div class="ev">
    <div class="ev-top"><span class="ev-name">${esc(axis)}</span>
      <span class="ev-val">${a.s==null?'—':a.s}<span style="font-size:10px;color:var(--ink-3)">/100</span>
      <span class="spark" title="120d / 60d / today">${spark}</span></span></div>
    <div class="ev-track">${seg(m.v,'s-verified')}${seg(m.s,'s-self')}${seg(m.x,'s-contra')}</div>
    <div class="ev-cov"><div class="cov-known" style="width:${a.cov}%"></div><div class="cov-unknown" style="width:${100-a.cov}%"></div></div>
    ${opt.compact?'':`<div class="ev-foot"><span>${a.cov}% of this axis observed</span>
      <span class="trend t-${a.tr}">${a.tr==='n/a'?'':esc(a.tr)}</span></div>`}
  </div>`;
}
const LEGEND = `<div class="legend">
  <span><i class="s-verified"></i>verified</span><span><i class="s-self"></i>self-asserted</span>
  <span><i class="s-contra"></i>contradicted</span>
  <span><i class="cov-unknown" style="border:1px solid var(--rule)"></i>never observed</span></div>`;

/* ---------- thesis matching ---------- */
function thesisFit(d){
  const t = S.thesis; let miss = [];
  if(t.sectors.length && !t.sectors.includes(d.sector)) miss.push('sector');
  if(t.stages.length && !t.stages.includes(d.stage)) miss.push('stage');
  if(t.geos.length && !t.geos.includes(d.geo)) miss.push('geography');
  if((d.axes['Founder']?.s ?? 0) < t.minFounder) miss.push('founder floor');
  if(d.cap > t.maxCap) miss.push('cap ceiling');
  if(!t.firstTimeOK && d.first_time) miss.push('first-time founder');
  return {ok:miss.length===0, miss};
}
function nlFilter(d, q){
  if(!q.trim()) return true;
  const toks = q.toLowerCase().split(/[,\s]+/).filter(x=>x.length>2);
  const hay = [d.co,d.name,d.sector,d.geo,d.stage,d.rec,d.presence,
    d.first_time?'first-time':'repeat', d.prior_vc?'prior vc backing':'no prior vc',
    ...d.claims.map(c=>c.t)].join(' ').toLowerCase();
  return toks.every(t=>hay.includes(t));
}

function tEvidence(d){
  const rows = d.claims.slice().sort((a,b)=>AX.indexOf(a.ax)-AX.indexOf(b.ax) || (b.tr??-1)-(a.tr??-1));
  const sizing = d.claims.find(c=>c.m);
  return `${sizing && sizing.m==='asserted_pct_of_tam'
    ? `<div class="note warn" style="margin-bottom:12px"><b>Market sizing red flag.</b> SOM is asserted as a flat share of TAM with no derivation. Trust on that claim is capped at 45 by rule. Ask for the unit chain before this number enters the memo.</div>`
    : `<div class="note" style="margin-bottom:12px"><b>Market sizing checks out.</b> SOM is derived bottom-up from a stated unit chain, not asserted as a share of TAM.</div>`}
  <div class="card" style="padding:0;overflow:auto;max-height:640px">
  <table><thead><tr><th>Claim</th><th>Axis / VSP</th><th>Evidence</th><th>Trust</th><th>Source</th><th>Seen</th></tr></thead><tbody>
  ${rows.map(c=>`<tr>
    <td>${esc(c.t)}${c.x?`<div class="cite">contradicts ${esc(c.x)}</div>`:''}</td>
    <td class="mono" style="font-size:11px;color:var(--ink-2)">${esc(c.ax)}<br>${esc(c.v)}</td>
    <td><span class="pill p-${c.st}">${esc(c.st.replace('_',' '))}</span></td>
    <td class="mono">${c.tr??'—'}</td>
    <td style="font-size:11.5px;color:var(--ink-2)">${esc(c.src??'—')}</td>
    <td class="mono" style="font-size:11px;color:var(--ink-3)">${esc(c.d??'—')}</td></tr>`).join('')}
  </tbody></table></div>`;
}

function tCanvas(d){
  const g = b=>d.bmc.find(x=>x.b===b) || {c:'—',s:'gap_flagged'};
  const cell=(b,cls)=>{const x=g(b);return `<div class="${cls}${x.s==='gap_flagged'?' miss':''}"><h5>${esc(b)}</h5><p>${esc(x.c)}</p></div>`};
  const filled = d.bmc.filter(x=>x.s==='stated').length;
  return `<p style="color:var(--ink-2);margin:0 0 10px">${filled} of 9 blocks articulated in available materials. Hatched blocks are gaps, carried straight into the memo rather than filled in.</p>
  <div class="bmc">
    ${cell('Key partners','b1')}${cell('Key activities','b1')}${cell('Value proposition','b1')}${cell('Customer relationships','b1')}${cell('Customer segments','b1')}
    ${cell('Key resources','b1')}<div style="grid-column:span 1"></div><div style="grid-column:span 1"></div>${cell('Channels','b1')}<div></div>
    ${cell('Cost structure','b2')}${cell('Revenue streams','b2')}<div></div>
  </div>`;
}

  const maxF = Math.max(...all.map(c=>c.f), 10);
  const x = f=>Math.min(97, (Math.log10(f+1)/Math.log10(maxF+1))*100);
  return `<div class="split" style="grid-template-columns:1.15fr 1fr">
    <div class="card">
      <div class="eyebrow">Penetration against disclosed funding</div>
      <p style="font-size:12.5px;color:var(--ink-2);margin:6px 0 0">Penetration is modeled from named customer logos, press mentions and open roles. This company's own position is estimated from its traction axis, so treat it as a band, not a point.</p>
      <div class="pen">
        ${all.map(c=>`<div class="pt ${c.you?'pt-you':(c.r==='direct'?'pt-direct':'pt-indirect')}"
            style="left:${x(c.f)}%;bottom:${c.pen}%" title="${esc(c.n)}"></div>

    </div>
    <div class="card" style="padding:0;overflow:auto;max-height:420px">
      <table><thead><tr><th>Competitor</th><th>Rel</th><th>Raised</th><th>Pen.</th><th>Threat</th></tr></thead><tbody>
      ${d.comp.map(c=>`<tr><td><b>${esc(c.n)}</b><div class="cite">${c.l} logos · ${c.p} mentions · ${c.o} open roles</div></td>
        <td class="mono" style="font-size:11px">${esc(c.r)}</td><td class="mono">$${c.f}M</td><td class="mono">${c.pen}</td>

    ${d.news.slice(0,8).map(n=>`<tr><td class="mono" style="width:78px;font-size:11px;color:var(--ink-3)">${n.d}d ago</td>
      <td>${esc(n.h)}</td><td style="width:80px"><span class="pill p-${n.s==='negative'?'contradicted':n.s==='positive'?'verified':'unobserved'}">${esc(n.s)}</span></td></tr>`).join('')}
    </tbody></table>
    <p class="cite" style="margin-top:8px">Synthetic wire copy. In production this is where real article extraction and per-claim attribution goes.</p>
  </div>`;
}

    <p style="font-size:12.5px;color:var(--ink-2)">Shown separately on purpose. Averaging them would hide the disagreement between axes, which is the part worth reading.</p>

    <h3>SWOT</h3>

      <li><b>Strengths:</b> ${strong.length?esc(strong[0].t):'none evidenced'}</li>
      <li><b>Weaknesses:</b> ${weak.length?esc(weak[0].t):'none surfaced'}</li>
      <li><b>Opportunity:</b> ${d.comp.filter(x=>x.r==='indirect').length} adjacent players have not entered the wedge</li>
      <li><b>Risk:</b> ${d.comp.length?`${esc(d.comp[0].n)} at $${d.comp[0].f}M raised, ${esc(d.comp[0].th)}`:'no competitor set mapped'}</li>
    </ul>

    <h3>Traction and KPIs</h3>
    <ul>${tr.length?tr.map(x=>`<li>${line(x)}</li>`).join(''):'<li class="gap">Traction: no evidence located at time of drafting.</li>'}</ul>

    <p style="font-size:12.5px;color:var(--ink-2)">${d.ngaps} gaps flagged, none filled by inference. ${d.contra} open contradiction${d.contra===1?'':'s'} between claims.</p>

    <h3>Financials and round structure</h3>
    ${!disclosed(d) ? `<p class="gap">Financials: not provided. No burn, runway, cash position or milestone plan has been shared,
      so this memo does not contain a check size. That is a gap to close, not a mark against the company.</p>
      <p>What this memo can support today is a decision to <b>engage</b>: the three axes score
      ${AX.map(x=>`${esc(x)} ${d.axes[x]?.s ?? '—'}`).join(', ')}, on evidence that exists independently of any financial disclosure.
      The next action is to request five financial inputs from the founder and re-run this memo, not to estimate them here.</p>`
    : `<p class="gap">No audited financials at this stage. Figures below are modeled from the founder's stated cost and pricing assumptions and are labeled as estimates.</p>

I invest $100K at pre-seed. I am not asking you to pitch. I would rather understand what you are seeing in ${d.sector.toLowerCase()} that the rest of us are not.

If it is useful, our process is a single application and a decision inside 24 hours. If the timing is wrong, no follow-up.

  return `<div class="split">

}



/* ---------- pipeline: sourced -> interest -> AI call -> financials -> allocation ---------- */
const booked = d => S.booked.has(d.cid);
function stageStrip(d){
  const st = [
    ['Sourced', true, 'in the funnel'],
    ['Interest expressed', requested(d)||booked(d)||disclosed(d), 'investor engaged'],
    ['AI video interview', !!d.call || !!S.liveCalls[d.cid] || booked(d),
      S.liveCalls[d.cid]?('completed '+S.liveCalls[d.cid].at):d.call?'completed':'not taken yet'],
    ['Financials', disclosed(d), disclosed(d)?'received':'not provided'],
    ['Check sized', disclosed(d), disclosed(d)?`$${d.al.rec}K`:'blocked'],
  ];
  return `<div class="card" style="margin-top:12px;padding:11px 16px">
    <div style="display:flex;gap:0;flex-wrap:wrap;align-items:stretch">
      ${st.map(([n,ok,sub],i)=>`
        <div style="flex:1;min-width:130px;padding:0 12px;border-left:${i?'1px solid var(--rule-2)':'0'}">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="width:8px;height:8px;border-radius:50%;flex:none;background:${ok?'var(--live)':'var(--rule)'};border:${ok?'0':'1px solid var(--ink-3)'}"></span>
            <span style="font:600 11.5px/1.3 'IBM Plex Mono',monospace;color:${ok?'var(--ink)':'var(--ink-3)'}">${esc(n)}</span></div>
          <div style="font-size:11.5px;color:var(--ink-3);margin:2px 0 0 14px">${esc(sub)}</div>
        </div>`).join('')}
    </div></div>`;
}

/* ---------- AI call tab ---------- */
function tCall(d){
  if(S.liveCalls[d.cid]) return tCallLive(d, S.liveCalls[d.cid]);
  if(!d.call) return callAsk(d);
  const c = d.call, damp = (c.trust/100);
  return `<div class="split" style="grid-template-columns:1.15fr 1fr">
    <div class="card">
      <div class="eyebrow">Scored from what was said</div>
      <p style="font-size:12.5px;color:var(--ink-2);margin:6px 0 10px">Five roll-ups, each built only from content signals. Hover any row in the table below to see the inputs.</p>
      ${c.p.map(([n,v])=>`<div class="ev">
        <div class="ev-top"><span class="ev-name">${esc(n)}</span><span class="ev-val">${v}<span style="font-size:10px;color:var(--ink-3)">/100</span></span></div>
        <div class="ev-track"><div class="ev-seg s-verified" style="width:${v*damp}%"></div><div class="ev-seg s-self" style="width:${v*(1-damp)}%"></div></div>
      </div>`).join('')}
      <div class="legend"><span><i class="s-verified"></i>weight retained after trust damping</span><span><i class="s-self"></i>discounted for data quality</span></div>
      ${c.overclaim?`<div class="note warn" style="margin-top:11px"><b>Overclaim flagged.</b> High conviction, low specificity, few acknowledged unknowns and more future talk than past proof. Worth probing in a human call before this weighs on the decision.</div>`:''}
    </div>
    <div>
      <div class="card">
        <div class="eyebrow">Call trust</div>
        <div class="mono" style="font-size:30px;font-weight:600;margin:4px 0 2px">${c.trust}<span style="font-size:12px;color:var(--ink-3)">/100</span></div>
        <div class="kv"><span>Language spoken</span><b>${esc(c.lang)}</b></div>
        <div class="kv"><span>Audio quality</span><b>${c.audio}</b></div>
        <div class="kv"><span>Transcript confidence</span><b>${c.asr}</b></div>
        <div class="kv" style="border:0"><span>Effect on Founder axis</span><b style="color:${c.mod>0?'var(--live)':c.mod<0?'var(--alarm)':'inherit'}">${c.mod>0?'+':''}${c.mod}</b></div>
        <div class="note" style="margin-top:10px">Trust reflects data quality, not the founder. A poor line or a second language shrinks the call's influence toward zero rather than lowering anyone's score.</div>
      </div>
      <div class="card" style="margin-top:12px">
        <div class="eyebrow">Verification · what the video establishes</div>
        <div class="kv"><span>Live human in frame</span><b>${Math.round((c.face??0.93)*100)}% of take</b></div>
        <div class="kv"><span>Same person throughout</span><b>${Math.round((c.same??0.96)*100)}%</b></div>
        <div class="kv"><span>Liveness</span><b>${c.live??88}/100</b></div>
        <div class="kv" style="border:0"><span>Cuts in a continuous take</span><b>${c.cuts??0}</b></div>
        ${(c.vflags&&c.vflags!=='none')?`<div class="note warn" style="margin-top:9px"><b>Verification flags.</b> ${esc(c.vflags)}. Routed to a human, never silently scored.</div>`:'<div class="note" style="margin-top:9px">No verification flags. A real person, the same one throughout, in one continuous take.</div>'}
      </div>
      <div class="card" style="margin-top:12px">
        <div class="eyebrow">Recorded, deliberately not scored</div>
        <table style="margin-top:5px"><tbody>
        ${[['Gaze on camera', Math.round((c.gaze??0.62)*100)+'%'],['Expression variability', c.expr??0.44]].concat(c.delivery).map(([n,v])=>`<tr><td style="padding:5px 0;border:0;color:var(--ink-2);font-size:12.5px">${esc(n)}</td>
          <td class="mono" style="padding:5px 0;border:0;text-align:right;font-size:12px">${esc(String(v))}</td></tr>`).join('')}
        </tbody></table>
        <div class="note warn" style="margin-top:10px">These carry zero weight. Gaze, facial expression, latency and sentiment track culture, accent, neurodivergence, eyewear and camera placement at least as well as they track founder quality. Emotion inference from faces does not replicate reliably across populations, and several jurisdictions restrict scoring it in hiring-adjacent decisions. Shown for a human to read, never summed into a number.</div>
      </div>
    </div>
  </div>
  <div class="card" style="margin-top:12px;padding:0;overflow:auto">
    <table><thead><tr><th>Content signal</th><th>Value</th><th>Why it is scoreable</th></tr></thead><tbody>
    ${c.content.map(([n,v],i)=>`<tr><td><b>${esc(n)}</b></td><td class="mono">${esc(String(v))}</td>
      <td style="font-size:12px;color:var(--ink-2)">${esc([
        'Deflection is a choice about substance, not a speech pattern.',
        'Whether an answer names a problem, a solution and proof is independent of fluency.',
        'Concrete numbers and named customers are verifiable against the memo.',
        'How a claim survives a counter-argument is the closest proxy to founder judgement.',
        'Saying "I do not know" is evidence of calibration, and it is rare enough to be informative.',
        'A specific failure with a specific lesson cannot be faked as easily as optimism.',
        'Cross-checks the call against the deck and public record, catching drift.',
        'Founders who ask sharp questions are testing the investor, which is a good sign.',
        'Promise-to-proof ratio. Above 1 means more roadmap than results.'][i]||'')}</td></tr>`).join('')}
    </tbody></table></div>`;
}


/* An interview the founder completed in this session. Same scoring path as every
   other call in the dataset, so nothing here is a special case. */
function tCallLive(d, L){
  const t = L.totals, vm = L.vm, damp = L.trust/100;
  const rows = [
    ['Concrete numbers used', t.numbers, 'Specificity, conviction'],
    ['Named people, products, places', t.proper, 'Specificity, checkable against the deck'],
    ['Stated past actions', t.past, 'Proof'],
    ['Stated future intentions', t.future, 'Lowers proof when it outweighs the line above'],
    ['Unknowns admitted', t.unknowns, 'Realism, coachability'],
    ['Causal reasoning', t.causal, 'Clarity, challenge response'],
    ['Concessions and lessons', t.concede, 'Coachability, resilience'],
    ['Absolute claims', t.absolutes, 'Lowers realism'],
    ['Vague intensifiers', t.hedge, 'Lowers specificity and clarity'],
  ];
  return `<div class="note" style="margin-bottom:12px;border-left:3px solid var(--live)">
    <b>Interview completed at ${esc(L.at)}.</b> The founder took it on demand, unprompted by a calendar.
    Everything below was scored from what they actually said, on the same rubric as every other call in the pipeline.</div>
  <div class="split" style="grid-template-columns:1.15fr 1fr">
    <div class="card">
      <div class="eyebrow">Tier 1 · scored from content</div>
      ${Object.entries(L.roll).map(([k,v])=>`<div class="ev">
        <div class="ev-top"><span class="ev-name">${k}</span><span class="ev-val">${v}<span style="font-size:10px;color:var(--ink-3)">/100</span></span></div>
        <div class="ev-track"><div class="ev-seg s-verified" style="width:${v*damp}%"></div><div class="ev-seg s-self" style="width:${v*(1-damp)}%"></div></div>
      </div>`).join('')}
      <div class="legend"><span><i class="s-verified"></i>weight retained after trust damping</span><span><i class="s-self"></i>discounted for data quality</span></div>
      ${L.overclaim?`<div class="note warn" style="margin-top:11px"><b>Overclaim flagged.</b> Confident language, thin specifics, more future than past, no admitted unknowns. Probe before this weighs on the decision.</div>`:''}
    </div>
    <div>
      <div class="card">
        <div class="eyebrow">Tier 2 · verification</div>
        ${vm ? `<div class="kv"><span>Live human in frame</span><b>${vm.present}% of take</b></div>
        <div class="kv"><span>Liveness</span><b>${vm.liveness}/100</b></div>
        <div class="kv"><span>Lighting</span><b>${vm.lighting}/100</b></div>
        <div class="kv"><span>Frames analysed</span><b>${vm.frames}</b></div>
        <div class="kv" style="border:0"><span>Time on camera</span><b>${vm.seconds}s</b></div>`
        : `<div class="note warn" style="margin:4px 0 0"><b>No video.</b> The founder answered without a camera, so identity and liveness are unobserved. Call trust is reduced accordingly. Their content scores are untouched, and this is not held against them.</div>`}
        <div class="eyebrow" style="margin-top:12px">Call trust</div>
        <div class="mono" style="font-size:28px;font-weight:600">${L.trust}<span style="font-size:12px;color:var(--ink-3)">/100</span></div>
        <div class="kv"><span>Words given</span><b>${L.words}</b></div>
        <div class="kv" style="border:0"><span>Effect on Founder axis</span><b style="color:${L.mod>0?'var(--live)':L.mod<0?'var(--alarm)':'inherit'}">${L.mod>0?'+':''}${L.mod}</b></div>
      </div>
      <div class="card" style="margin-top:12px">
        <div class="eyebrow">Tier 3 · observed, not scored</div>
        <div class="kv"><span>Motion in frame</span><b>${vm?vm.motion:'not observed'}</b></div>
        <div class="kv"><span>Answer length spread</span><b>${t.asked!=null?L.words:'—'} words total</b></div>
        <div class="kv" style="border:0"><span>Questions asked back</span><b>${t.asked}</b></div>
        <p class="cite" style="margin-top:8px;display:block;line-height:1.45">Facial expression, gaze and tone are not inferred. Scoring them would penalise how a founder looks rather than what they said.</p>
      </div>
    </div>
  </div>
  <div class="card" style="margin-top:12px;padding:0;overflow:auto">
    <table><thead><tr><th>Signal in the transcript</th><th>Count</th><th>Feeds</th></tr></thead><tbody>
      ${rows.map(([n,v,e])=>`<tr><td><b>${esc(n)}</b></td><td class="mono" style="width:70px">${v}</td>
        <td style="font-size:12px;color:var(--ink-2)">${esc(e)}</td></tr>`).join('')}
    </tbody></table></div>
  <div class="card" style="margin-top:12px">
    <div class="eyebrow">Transcript</div>
    ${L.answers.map((a,i)=>`<div style="padding:9px 0;border-bottom:1px solid var(--rule-2)">
      <div class="cite">${esc(IV_Q[i].q)}</div>
      <div style="font-size:12.5px;margin-top:3px;white-space:pre-wrap">${esc(a&&a.trim()?a:'(skipped, recorded as unobserved)')}</div></div>`).join('')}
  </div>`;
}

               : 'An on-demand video interview sits between expressed interest and the financial request. No calendars, no partner time. It produces first-party behavioural evidence for the components public data can never reach, which is most of the Founder axis for a cold-start founder.'}</p>

/* ---------- founder score, with its arithmetic exposed ---------- */
function fsCard(d){
  const f = fscore(d), p = f.p;
  const band = p==null?'':`<div style="height:6px;background:var(--rule-2);border-radius:3px;position:relative;margin:8px 0 4px">
      <div style="position:absolute;left:${f.lo}%;width:${(f.hi-f.lo)}%;top:0;bottom:0;background:var(--rule);border-radius:3px"></div>
      <div style="position:absolute;left:${p}%;top:-3px;width:2px;height:12px;background:var(--ink)"></div></div>
    <div class="ev-foot"><span>${f.lo}</span><span>likely range at ${f.cov}% coverage</span><span>${f.hi}</span></div>`;
  return `<div class="card">
    <div class="eyebrow">Founder Score</div>
    <div style="display:flex;align-items:baseline;gap:7px;margin:6px 0 0">
      <span class="mono" style="font-size:42px;font-weight:600;line-height:1">${p==null?'—':p.toFixed(1)}</span>

    ${band}
    <p style="font-size:12.5px;color:var(--ink-2);margin:8px 0 6px">Follows the person, not this company. The band is not decoration: it widens as evidence coverage falls, so a thin profile cannot masquerade as a precise one.</p>
    <table style="font-size:12px"><tbody>
    ${f.parts.map(([n,v,w])=>`<tr><td style="padding:4px 0;border:0">${esc(n)}</td>
      <td class="mono" style="padding:4px 0;border:0;color:var(--ink-3);width:44px">${(w*100).toFixed(0)}%</td>
      <td style="padding:4px 0;border:0;width:80px"><div style="height:6px;background:var(--rule-2);border-radius:1px">
        <div style="height:100%;width:${v==null?0:v}%;background:var(--ink);border-radius:1px"></div></div></td>
      <td class="mono" style="padding:4px 0;border:0;text-align:right;width:42px">${v==null?'n/a':v.toFixed(0)}</td></tr>`).join('')}
    </tbody></table>
    ${S.liveCalls[d.cid]?`<div class="kv" style="margin-top:9px;border:0"><span>AI interview effect on Founder axis</span><b style="color:${S.liveCalls[d.cid].mod>0?'var(--live)':'var(--alarm)'}">${S.liveCalls[d.cid].mod>0?'+':''}${S.liveCalls[d.cid].mod}</b></div>`:''}
    ${disclosed(d)?'':'<p class="cite" style="margin-top:8px;display:block;line-height:1.45">Capital discipline is not scored yet. It needs the founder\'s milestone plan, which arrives with the financials.</p>'}
    <p class="cite" style="margin-top:6px;display:block;line-height:1.45">${esc(d.fsb.formula)}</p>
  </div>`;
}

/* ---------- allocation: the number ---------- */

      </div>
      <div style="min-width:220px;flex:1">

        <div class="eyebrow" style="margin-bottom:4px">Axis modifiers applied</div>

/* No financials yet: say what can and cannot be decided, and offer the ask. */
function askStrip(d){
  const req = requested(d);

        <div class="eyebrow">Recommended allocation</div>

function tFin(d){
  if(!disclosed(d)) return tFinAsk(d);
  const a = d.al, cats = [...new Set(d.fin.map(x=>x.cat))];
  const sizes = [50,100,150,200];
  return `<div class="note" style="margin-bottom:12px"><b>Two things about these weights.</b>
    Your thresholds file assigns weights that sum to <span class="mono">1.14</span>, not 1.00, so every figure below is
    normalized by that total. Both are shown. And the file's own bands disagree with each other: it calls
    <span class="mono">&lt;$15K/month</span> burn "lean" while asking a $100K check to buy 12 to 18 months, which needs
    <span class="mono">$180K to $270K</span>. This model resolves it by sizing the check to the burn rather than assuming $100K.</div>
  <div class="split" style="grid-template-columns:1.6fr 1fr">
    <div class="card" style="padding:0;overflow:auto;max-height:560px">
      <table><thead><tr><th>Metric</th><th>Estimate</th><th>Band</th><th>Score</th><th>Wt (raw / norm)</th><th>Contribution</th></tr></thead><tbody>
      ${cats.map(cat=>`<tr><td colspan="6" style="background:var(--panel-2);font:600 9.5px/1 'IBM Plex Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);padding:7px 8px">${esc(cat)}</td></tr>

/* ================= LIVE AI INTERVIEW =================
   This is not a mock. Every score below is computed from the text the user types,
   using the content signals from the schema. The rubric is shown alongside the
   result so a founder can see exactly what moved each number. */


/* --- the scorer. Transparent, auditable, and it runs on the user's own words.
       Counts OCCURRENCES, not just presence, and excludes sentence-initial capitals
       so "Yes." does not register as a named entity. --- */
function scoreAnswer(t){
  const raw = (t||"").trim();
  const words = raw ? raw.split(/\s+/).length : 0;
  const low = " " + raw.toLowerCase().replace(/\s+/g," ") + " ";
  const count = res => res.reduce((a,re)=>a+((low.match(re)||[]).length),0);

  const numbers = (raw.match(/\b\d[\d,.]*\s*(%|k\b|m\b|x\b|hours?|weeks?|months?|days?|sites?|users?|customers?)?/gi)||[]).length
                + (raw.match(/\$\s?\d[\d,.]*/g)||[]).length;
  // named entities: capitalised words that are not the first word of a sentence
  const proper = (raw.replace(/(^|[.!?]\s+)[A-Z]/g, m=>m.toLowerCase())
                     .match(/\b[A-Z][A-Za-z]{2,}/g)||[]).length;

  const unknowns = count([/i (don't|do not|didn't) know/g,/not sure/g,/we (don't|do not) know/g,/unsure/g,
                          /uncertain/g,/haven'?t tested/g,/have not tested/g,/open question/g,/i'?m not certain/g,
                          /still figuring/g,/no idea/g,/unclear/g,/might not/g,/may not be/g]);
  const past = count([/\bwe (did|shipped|built|ran|tested|talked|spoke|found|learned|tried|closed|cut|signed|rebuilt|launched|started)\b/g,
                      /\bi (did|shipped|built|ran|tested|talked|spoke|found|learned|tried|spent|closed|was)\b/g,
                      /\blast (month|year|week|quarter)\b/g,/\bso far\b/g,/\bturned out\b/g,/\bsince \w+\b/g,
                      /\bhas been\b/g,/\bhave been\b/g,/\bcame through\b/g,/\bwent\b/g]);
  const future = count([/\bwe will\b/g,/\bi will\b/g,/\bwe'?re going to\b/g,/\bgoing to\b/g,/\bplan to\b/g,
                        /\bhope to\b/g,/\baim to\b/g,/\bintend to\b/g,/\beventually\b/g,/\bthe vision\b/g,
                        /\bwould be\b/g,/\bwill be\b/g]);
  const causal = count([/\bbecause\b/g,/\bso that\b/g,/\bwhich means\b/g,/\btherefore\b/g,/\bas a result\b/g,
                        /\bwhich taught\b/g,/\bwhich let\b/g,/\bso we\b/g,/\bwhich is why\b/g,/\bif .{3,40} then\b/g]);
  const structure = count([/\bthe problem\b/g,/\bthe reason\b/g,/\bfirst\b/g,/\bsecond\b/g,/\bthird\b/g,
                           /\bfor example\b/g,/\bspecifically\b/g,/\binstead\b/g,/\bcurrently\b/g,/\btoday\b/g,
                           /\btwo things\b/g,/\bour wedge\b/g]);
  const concede = count([/\byou'?re right\b/g,/\bfair point\b/g,/\bi was wrong\b/g,/\bwe were wrong\b/g,
                         /\bi changed\b/g,/\bwe changed\b/g,/\bwe pivoted\b/g,/\bin hindsight\b/g,
                         /\bi learned\b/g,/\bwe learned\b/g,/\bmistake\b/g,/\bgot it wrong\b/g,
                         /\bfailed\b/g,/\bnobody bought\b/g,/\bdid not convert\b/g,/\bdidn'?t work\b/g,
                         /\bi assumed\b/g,/\bi was (wrong|mistaken)\b/g]);
  const vague = count([/\ba lot of\b/g,/\bmany people\b/g,/\beveryone\b/g,/\bhuge\b/g,/\bmassive\b/g,
                       /\benormous\b/g,/\bgame.changing\b/g,/\brevolutionary\b/g,/\bdisrupt/g,
                       /\bbest in class\b/g,/\bobviously\b/g,/\bmarket leader\b/g,/\bgreat team\b/g]);
  const absolutes = count([/\balways\b/g,/\bnever\b/g,/\bnobody else\b/g,/\bno one else\b/g,/\bguaranteed\b/g,
                           /\bdefinitely\b/g,/\bnot worried\b/g,/\bsolid\b/g,/\bwill hit\b/g,/\bcertainly\b/g]);
  const question = (raw.match(/\?/g)||[]).length;

  const cap=(x,m=100)=>Math.max(2,Math.min(m,Math.round(x)));
  const dens = words ? Math.min(1.35, words/55) : 0;   // credit per answer, saturating
  const thin = words < 12 ? 0.25 : 1;                  // a 3-word answer evidences almost nothing

  const specificity = cap((18 + numbers*6.5 + proper*5.5 - vague*7 - absolutes*4) * dens * thin);
  const structureS  = cap((20 + structure*9 + causal*10) * dens * thin);
  const pastProof   = cap((26 + past*12 - future*5) * dens * thin);
  const challenge   = cap((22 + causal*9 + past*7 + proper*3.5 - absolutes*9 - vague*5) * dens * thin);
  const coach       = cap((20 + concede*14 + unknowns*11 - absolutes*7) * dens * thin);
  const realism     = cap((24 + unknowns*11 + causal*7 + past*5 - absolutes*10 - vague*7) * dens * thin);
  const clarity     = cap((18 + structure*7.5 + causal*8 + numbers*2.5 - vague*7) * dens * thin);
  const conviction  = cap((30 + numbers*4 + past*7 + proper*3 - unknowns*2 - vague*3) * dens * thin);
  const resilience  = cap((20 + concede*13 + past*7 + unknowns*4) * dens * thin);

  return {words, numbers, proper, unknowns, past, future, causal, structure, concede,
          hedgeVague:vague, absolutes, question,
          s:{Clarity:clarity, Conviction:conviction, Coachability:coach,
             Resilience:resilience, Realism:realism},
          detail:{specificity, structureS, pastProof, challenge, unknownsS:cap(unknowns*26+8)}};
}

function scoreInterview(answers){
  const per = answers.map(scoreAnswer);
  const n   = Math.max(1, per.filter(p=>p.words>3).length);   // skipped = unobserved, not zero
  const sum = k => per.reduce((a,p)=>a+p[k],0);
  const words = sum('words');

  /* Roll-ups are computed from interview TOTALS, not from the mean of per-answer
     scores. A founder admits one decisive mistake once; averaging that across six
     questions would erase it. */
  const cap  = x => Math.max(2, Math.min(98, Math.round(x)));
  const dens = Math.min(1.2, 0.62 + words/(n*90));            // credit for saying something
  const thin = words < 25 ? 0.3 : 1;
  const T = {numbers:sum('numbers'), proper:sum('proper'), unknowns:sum('unknowns'),
             past:sum('past'), future:sum('future'), causal:sum('causal'),
             structure:sum('structure'), concede:sum('concede'),
             absolutes:sum('absolutes'), hedge:sum('hedgeVague'), asked:sum('question')};
  const p = (base, terms) => cap((base + terms) * dens * thin);

  const roll = {
    Clarity:      p(26, T.structure*2.5 + T.causal*3.1 + Math.min(T.numbers,14)*0.8 - T.hedge*3.6),
    Conviction:   p(30, Math.min(T.numbers,16)*1.1 + T.past*2.0 + Math.min(T.proper,10)*1.0 - T.hedge*2.2),
    Coachability: p(28, T.concede*5.5 + T.unknowns*6.0 - T.absolutes*3.0),
    Resilience:   p(28, T.concede*5.0 + T.past*2.4 + T.unknowns*2.6),
    Realism:      p(30, T.unknowns*5.5 + T.causal*2.6 + T.past*1.8 - T.absolutes*4.2 - T.hedge*3.0),
  };

  // Trust is data sufficiency. Thin answers shrink the call's influence, never the founder.
  const trust = Math.max(15, Math.min(96, Math.round(24 + Math.min(words,400)/400*70)));
  const mod = Math.max(-6, Math.min(6, Math.round(
    ((roll.Clarity*.22 + roll.Coachability*.26 + roll.Resilience*.22 + roll.Realism*.30) - 52)
    * 0.13 * (trust/100) * 10)/10));

  const avgSpec = per.reduce((a,q)=>a+q.detail.specificity,0)/Math.max(1,per.length);
  const overclaim = words > 40 && avgSpec < 45 && T.unknowns <= 1
                    && T.future >= T.past && (T.absolutes + T.hedge) >= 3;
  return {per, roll, trust, mod, words, overclaim, totals:T};
}

/* ================= ON-DEMAND VIDEO INTERVIEW =================
   No scheduling. The founder starts it whenever they want, camera on.
   Three tiers of output, and the difference between them is the whole design:
     SCORED        content of the answers
     VERIFICATION  what video genuinely establishes: a live human, same human, one take
     OBSERVED      affect, gaze, delivery. Recorded for a human to read. Weighted zero.
   Video metrics below are measured from real frames, not simulated. */

const V = {stream:null, raw:null, rec:null, timer:null, t0:0,
           samples:[], lastFrame:null, motion:0, lit:0, present:0, n:0, err:null};

async function ivCamera(){
  const framed = (()=>{ try{ return window.self !== window.top; }catch(e){ return true; } })();
  if(!navigator.mediaDevices || !window.isSecureContext){ V.err = framed ? 'framed' : 'insecure'; render(); return; }
  try{
    V.stream = await navigator.mediaDevices.getUserMedia({video:{width:640,height:480}, audio:true});
    V.err = null;
  }catch(e){ V.err = e.name==='NotAllowedError' ? 'permission_denied'
                   : e.name==='NotFoundError' ? 'no_camera'
                   : e.name==='NotReadableError' ? 'in_use'
                   : framed ? 'framed' : 'blocked'; }
  render();
  if(V.stream) requestAnimationFrame(ivAttach);
}
function ivAttach(){
  const v = document.getElementById('ivVideo');
  if(v && V.stream && v.srcObject !== V.stream){ v.srcObject = V.stream; v.play().catch(()=>{}); }
  if(V.stream && !V.timer) V.timer = setInterval(ivSample, 250);   // 4 fps analysis loop
}
/* Measure only what a frame can honestly support: is someone there, are they moving,
   is the shot usable. No emotion inference. */
function ivSample(){
  const v = document.getElementById('ivVideo'), c = document.getElementById('ivCanvas');
  if(!v || !c || v.videoWidth === 0) return;
  const g = c.getContext('2d', {willReadFrequently:true});
  g.drawImage(v, 0, 0, 64, 48);
  const d = g.getImageData(0, 0, 64, 48).data;
  let lum = 0, mid = 0, midN = 0;
  for(let i=0; i<d.length; i+=4){
    const L = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
    lum += L;
    const px = (i/4) % 64, py = Math.floor((i/4)/64);
    if(px>16 && px<48 && py>8 && py<40){ mid += L; midN++; }
  }
  lum /= (d.length/4); mid /= Math.max(1,midN);
  let mo = 0;
  if(V.lastFrame){ for(let i=0;i<d.length;i+=16) mo += Math.abs(d[i]-V.lastFrame[i]); mo /= (d.length/16); }
  V.lastFrame = new Uint8ClampedArray(d);
  V.n++; V.lit += lum; V.motion += mo;
  // "present" = subject brighter than the frame average in the centre, plus some motion.
  // A crude but honest liveness proxy: a photo held to the lens produces no motion.
  if(mid > lum*0.92 && lum > 22) V.present++;
  V.samples.push({lum:Math.round(lum), mo:Math.round(mo*10)/10});
  if(V.samples.length > 400) V.samples.shift();
}
function ivStopCam(){
  if(V.timer){ clearInterval(V.timer); V.timer=null; }
  if(V.stream){ V.stream.getTracks().forEach(t=>t.stop()); V.stream=null; }
}
function ivVideoMetrics(){
  if(!V.n) return null;
  const lit = V.lit/V.n, mo = V.motion/V.n, present = V.present/V.n;
  const framesOK = Math.min(100, Math.round(lit/1.4));
  const liveness = Math.round(Math.min(99, (present*70) + Math.min(30, mo*9)));
  return {
    frames:V.n, lighting:Math.max(5,Math.min(99,framesOK)), motion:Math.round(mo*10)/10,
    present:Math.round(present*100), liveness:Math.max(5,liveness),
    seconds:Math.round(V.n/4),
  };
}

let REC = null;
function ivListen(on){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return false;
  if(!on){ if(REC){ REC.stop(); REC=null; } return true; }
  REC = new SR(); REC.continuous = true; REC.interimResults = true; REC.lang = 'en-US';
  REC.onresult = ev => {
    let fin = '';
    for(let i=ev.resultIndex; i<ev.results.length; i++) if(ev.results[i].isFinal) fin += ev.results[i][0].transcript + ' ';
    if(fin){ S.iv.answers[S.iv.q] = ((S.iv.answers[S.iv.q]||'') + ' ' + fin).trim();
             const t=document.getElementById('ivAns'); if(t) t.value = S.iv.answers[S.iv.q]; }
  };
  REC.onerror = ()=>{}; try{ REC.start(); }catch(e){}
  return true;
}

        ${AX.map(x=>`<div class="kv"><span>${esc(x)}</span><b>${d.axes[x]?.cov ?? 0}% of components answered</b></div>`).join('')}
        <div class="note" style="margin-top:10px">${d.presence==='no_social'
          ? 'You have no public footprint, so most of what an investor could scrape does not exist. That is not a penalty. It means the evidence has to come from you, which is what this form is for.'
          : 'Your public footprint covers most components. The questions here fill what it cannot reach.'}</div>
      </div>

        ${missing.length?`<div class="card" style="margin-top:12px"><div class="eyebrow">Still blank</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">
        ${missing.map(x=>`<span class="pill p-unobserved">${esc(x.cp)}</span>`).join('')}</div>
        <p style="font-size:12px;color:var(--ink-3);margin-top:9px">Each one you fill raises your coverage.</p></div>`:''}
    </div>
  </div>
  <div style="margin-top:14px;display:flex;gap:8px;align-items:center">
    <button class="btn" id="submitProfile">Submit for a 24-hour decision</button>
    <span style="font-size:12.5px;color:var(--ink-2)">Minimum to submit is a company name and a deck. Everything else raises your coverage.</span>
  </div>`;
}


/* ---------- founder: the interview, on its own page ---------- */
function vInterview(){
  const d = byId(S.portal), sent = S.liveCalls[S.portal];
  return `<div class="head"><div><h2>AI interview</h2>
    <p>Six questions, camera on, whenever suits you. There is nothing to schedule and no partner to wait for.</p></div></div>
  <div class="note" style="margin-bottom:12px"><b>Before you start, what happens to this recording.</b>
    Your answers are transcribed and read by the investor. The video is used to confirm that a real, live person answered
    and that it was the same person throughout. Your facial expressions, gaze and tone of voice are
    <b>not</b> interpreted or scored. The investor forms their own assessment from what you said, and that assessment is
    internal to them, so it is not shown back to you here.</div>
  ${sent?`<div class="card" style="border-left:3px solid var(--live)">
    <div class="eyebrow">Submitted</div>
    <h3 style="font-size:17px;margin:6px 0 4px">Your interview went to the investor at ${esc(sent.at)}</h3>
    <p style="font-size:13px;color:var(--ink-2);margin:0 0 10px;max-width:66ch">
      ${sent.answers.filter(a=>a&&a.trim()).length} of ${IV_Q.length} questions answered${sent.vm?', with camera':', without camera'}.
      You can retake it if you want the investor to see a better version. They will see that you retook it, and both versions stay on file.</p>
    <div class="eyebrow" style="margin-top:12px">What you said</div>
    ${sent.answers.map((a,i)=>`<div style="padding:9px 0;border-bottom:1px solid var(--rule-2)">
      <div class="cite">${esc(IV_Q[i].q)}</div>
      <div style="font-size:12.5px;margin-top:3px;white-space:pre-wrap">${esc(a&&a.trim()?a:'(skipped)')}</div></div>`).join('')}
    <div style="margin-top:13px"><button class="btn ghost" id="ivRetake">Retake the interview</button></div>
  </div>`:ivPanel()}`;
}

/* ---------- founder: a plain record of what has been shared ---------- */
function vShared(){
  const d = byId(S.portal), P = S.profile, sent = S.liveCalls[S.portal];
  const answered = Object.entries(P).filter(([k,v])=>String(v||'').trim()).length;
  const items = [
    ['Application answers', answered ? `${answered} fields completed` : 'not started', !!answered],
    ['Financials', disclosed(d) ? 'sent' : requested(d) ? 'requested by the investor, not sent yet' : 'not sent', disclosed(d)],
    ['AI interview', sent ? `submitted ${sent.at}` : 'not taken yet', !!sent],
    ['Public footprint found', d.presence==='no_social' ? 'none, which is expected and fine' : 'some public record found', d.presence!=='no_social'],
  ];
  return `<div class="head"><div><h2>What I have shared</h2>
    <p>A plain record of what has left your account. Nothing here is an assessment.</p></div></div>
  <div class="split" style="grid-template-columns:1.1fr 1fr">
    <div class="card">
      <div class="eyebrow">Sent to the investor</div>
      ${items.map(([n,v,ok])=>`<div class="kv"><span>${esc(n)}</span>
        <b style="color:${ok?'var(--live)':'var(--ink-3)'}">${esc(v)}</b></div>`).join('')}
      <div class="note" style="margin-top:11px">Anything marked as not sent is recorded as unknown on the investor's side. Unknown is not the same as bad, and it is the only part of this you control.</div>
    </div>
    <div class="card">
      <div class="eyebrow">What you are not shown, and why</div>
      <p style="font-size:12.5px;color:var(--ink-2);margin:6px 0 8px">
        Scores, rankings, comparisons against other founders and the investor's memo are internal to the fund.
        The same is true at any firm. What is different here is that you can see exactly which inputs they hold on you,
        which is the part that is usually invisible.</p>
      <div class="kv"><span>Your scores</span><b>not shown</b></div>
      <div class="kv"><span>Comparison to other founders</span><b>not shown</b></div>
      <div class="kv"><span>Investment memo</span><b>not shown</b></div>
      <div class="kv" style="border:0"><span>Which inputs they hold on you</span><b style="color:var(--live)">shown, above</b></div>
    </div>
  </div>`;
}

/* ---------- investor only: interview scoring across the pipeline ---------- */
function vScoring(){
  const live = Object.entries(S.liveCalls);
  const withCall = D.deals.filter(d=>d.call);
  return `<div class="head"><div><h2>Interview scoring</h2>
    <p>Internal. Founders cannot reach this view from their own account, and no score here is shown back to them.</p></div></div>
  ${live.length?`<div class="card" style="border-left:3px solid var(--live);margin-bottom:12px">
    <div class="eyebrow">Completed in this session</div>
    <table style="margin-top:6px"><thead><tr><th>Founder</th><th>At</th><th>Clarity</th><th>Conviction</th><th>Coachability</th><th>Resilience</th><th>Realism</th><th>Trust</th><th>Founder axis</th></tr></thead><tbody>
    ${live.map(([cid,L])=>{const d=byId(cid); return `<tr data-open="${cid}" style="cursor:pointer">
      <td><b>${esc(d.name)}</b><div class="cite">${esc(d.co)}</div></td><td class="mono">${esc(L.at)}</td>
      ${Object.values(L.roll).map(v=>`<td class="mono">${v}</td>`).join('')}
      <td class="mono">${L.trust}</td>
      <td class="mono" style="color:${L.mod>0?'var(--live)':'var(--alarm)'}">${L.mod>0?'+':''}${L.mod}</td></tr>`;}).join('')}
    </tbody></table>
    <p style="font-size:12px;color:var(--ink-3);margin-top:9px">Click a row to open the full transcript and the verification tier in the deal room.</p></div>`
  :`<div class="note warn" style="margin-bottom:12px"><b>No interview completed in this session.</b> Switch to the founder view, take the interview, then come back here. The result lands in this table.</div>`}
  <div class="card" style="padding:0;overflow:auto;max-height:520px">
    <table><thead><tr><th>Founder</th><th>Company</th><th>Clarity</th><th>Conviction</th><th>Coach.</th><th>Resil.</th><th>Realism</th><th>Trust</th><th>Axis effect</th><th>Flags</th></tr></thead><tbody>
    ${withCall.map(d=>`<tr data-open="${d.cid}" style="cursor:pointer"><td><b>${esc(d.name)}</b></td><td>${esc(d.co)}</td>
      ${d.call.p.map(([n,v])=>`<td class="mono">${v}</td>`).join('')}
      <td class="mono">${d.call.trust}</td>
      <td class="mono" style="color:${d.call.mod>0?'var(--live)':'var(--alarm)'}">${d.call.mod>0?'+':''}${d.call.mod}</td>
      <td>${d.call.overclaim?'<span class="pill p-contradicted">overclaim</span>':''}${(d.call.vflags&&d.call.vflags!=='none')?'<span class="pill p-contradicted">verify</span>':''}</td></tr>`).join('')}
    </tbody></table></div>
  <div class="card" style="margin-top:12px"><div class="eyebrow">Why the columns stop where they do</div>
    <p style="font-size:12.5px;color:var(--ink-2);margin:6px 0 0;max-width:78ch">There is no column for gaze, facial expression, tone or response latency, because none of them is scored. They are recorded and visible per candidate in the deal room, for a human to read with judgement. Scoring them would rank founders by accent, culture and camera placement, and several jurisdictions now restrict exactly that in hiring-adjacent decisions.</p></div>`;
}

function vSourcing(){
  return `<div class="head"><div><h2>Sourcing config</h2>
    <p>The two tracks the crawler runs. Left is what exists when a founder posts. Right is what exists when they do not, which is the case the whole system is built around.</p></div></div>
  <div class="card" style="padding:0;overflow:auto;max-height:520px">
    <table><thead><tr><th>Axis</th><th>Component</th><th>Wt</th><th>If public footprint exists</th><th>If it does not</th><th>Trust rule</th></tr></thead><tbody>
    ${D.sourcing.map(s=>`<tr><td class="mono" style="font-size:11px">${esc(s.ax)}</td><td><b>${esc(s.cp)}</b></td>
      <td class="mono">${s.w}%</td><td style="font-size:12px;color:var(--ink-2)">${esc(s.soc)}</td>
      <td style="font-size:12px">${esc(s.nos)}</td><td style="font-size:11.5px;color:var(--ink-2)">${esc(s.rule)}</td></tr>`).join('')}
    </tbody></table></div>
  <div class="card" style="margin-top:12px;padding:0;overflow:auto;max-height:420px">
    <table><thead><tr><th>Theme</th><th>Keywords</th><th>Use</th><th>Sentiment</th></tr></thead><tbody>
    ${D.kw.map(k=>`<tr><td class="mono" style="font-size:11.5px"><b>${esc(k.t)}</b></td>
      <td style="font-size:12px;color:var(--ink-2)">${esc(k.k)}</td><td style="font-size:12px">${esc(k.u)}</td>
      <td><span class="pill p-${k.s.includes('Negative')&&!k.s.includes('Positive')?'contradicted':k.s.includes('Positive')?'verified':'unobserved'}">${esc(k.s)}</span></td></tr>`).join('')}
    </tbody></table></div>
  <div class="card" style="margin-top:12px"><div class="eyebrow">Component weights inside each axis</div>
    <table style="margin-top:6px"><tbody>
    ${D.cmap.map(c=>`<tr><td class="mono" style="font-size:11px;color:var(--ink-2);width:150px">${esc(c.ax)}</td>
      <td>${esc(c.cp)}</td><td class="mono" style="width:60px">${c.v}</td>
      <td class="mono" style="width:70px">${c.w?(c.w*100).toFixed(0)+'%':'—'}</td></tr>`).join('')}
    </tbody></table>
    <p style="font-size:12px;color:var(--ink-3);margin-top:8px">Diligence components carry no weight on purpose. They feed the memo's gap list rather than any axis score.</p></div>`;
}


/* Two products in one file. A founder signed in as a founder can reach nothing
   on the investor side, and no score is rendered anywhere they can see. */
const RAILS = {
  founder: [['My application','portal'],['AI interview','interview'],['What I have shared','shared']],
  investor:[['Signal desk','desk'],['Deal room','deal'],['Compare founders','compare'],['Thesis','thesis'],
            ['Interview scoring','scoring'],['Sourcing config','sourcing']],
};
function drawRail(){
  const isF = S.role==='founder';
  document.getElementById('rail').innerHTML = `
    <div class="brand"><h1>VC Brain</h1><p>${isF?'Founder application':'Signal to decision'}</p></div>
    <div class="navsec">${isF?'Your application':'Investor'}</div>
    ${RAILS[S.role].map(([label,v])=>`<button class="navbtn" data-v="${v}">${label}</button>`).join('')}
    <div class="railfoot">
      ${isF ? `<div style="margin-bottom:9px">You are signed in as a founder. Scoring and investor notes are not visible from this account.</div>`
            : `<div style="margin-bottom:9px">Investor account. Everything here is internal and is never shown to founders.</div>`}
      <button class="btn ghost" id="roleSw" style="width:100%;font-size:11px;padding:5px 8px">
        ${isF?'Demo: switch to investor view':'Demo: switch to founder view'}</button>
      <div style="margin-top:9px">All data is synthetic. Sources resolve to <span class="mono">example-source.invalid</span>.</div>
    </div>`;
}

/* ---------- render + events ---------- */
const VIEWS = {desk:vDesk, deal:vDeal, compare:vCompare, thesis:vThesis, portal:vPortal,
               sourcing:vSourcing, interview:vInterview, shared:vShared, scoring:vScoring};
const ALLOWED = {founder:['portal','interview','shared'],
                 investor:['desk','deal','compare','thesis','scoring','sourcing']};
function render(){
  if(typeof V!=='undefined' && V.stream) setTimeout(ivAttach,0);
  if(!ALLOWED[S.role].includes(S.view)) S.view = ALLOWED[S.role][0];
  drawRail();
  document.querySelectorAll('.navbtn').forEach(b=>b.setAttribute('aria-current', b.dataset.v===S.view));
  document.getElementById('view').innerHTML = VIEWS[S.view]();
  window.scrollTo({top:0});
}
document.addEventListener('click', e=>{
  if(e.target.id==='roleSw'){S.role = S.role==='founder'?'investor':'founder';
    S.view = ALLOWED[S.role][0]; window.scrollTo(0,0); return render();}
  const nav=e.target.closest('.navbtn'); if(nav){
    if(!ALLOWED[S.role].includes(nav.dataset.v)) return;
    S.view=nav.dataset.v; return render();}
  const open=e.target.closest('[data-open]'); if(open){S.sel=open.dataset.open; S.view='deal'; S.tab='evidence'; return render();}
  const tab=e.target.closest('[data-tab]'); if(tab){S.tab=tab.dataset.tab; return render();}
  const pair=e.target.closest('[data-pair]'); if(pair){const [a,b]=pair.dataset.pair.split('|'); S.cmpA=a; S.cmpB=b; return render();}
  const th=e.target.closest('[data-th]'); if(th){const k=th.dataset.th, v=th.dataset.val, arr=S.thesis[k];
    const i=arr.indexOf(v); i<0?arr.push(v):arr.splice(i,1); return render();}
  if(e.target.id==='coldbtn'){S.cold=!S.cold; return render();}
  if(e.target.id==='finbtn'){S.needfin=!S.needfin; return render();}
  if(e.target.id==='ivStart'){S.iv={on:true,q:0,answers:[],done:false}; V.n=0;V.lit=0;V.motion=0;V.present=0;V.samples=[];
    render(); ivCamera(); ivListen(true); return;}
  if(e.target.id==='ivStartNoCam'){S.iv={on:true,q:0,answers:[],done:false}; V.err='off'; return render();}
  if(e.target.id==='ivNext'||e.target.id==='ivSkip'||e.target.id==='ivBack'){
    const box=document.getElementById('ivAns');
    if(box && e.target.id!=='ivSkip') S.iv.answers[S.iv.q]=box.value;
    if(e.target.id==='ivSkip') S.iv.answers[S.iv.q]=S.iv.answers[S.iv.q]||'';
    if(e.target.id==='ivBack') S.iv.q=Math.max(0,S.iv.q-1);
    else if(S.iv.q===IV_Q.length-1){
      S.iv.vm=ivVideoMetrics(); S.iv.done=true; S.iv.on=false; ivListen(false); ivStopCam();
      // publish to the investor side: this founder's deal record now carries a completed interview
      const r=scoreInterview(S.iv.answers), vm=S.iv.vm;
      const vTrust = vm ? Math.round(Math.min(99, vm.liveness*0.55 + vm.present*0.30 + vm.lighting*0.15)) : null;
      S.liveCalls[S.portal] = {roll:r.roll, trust: vm?Math.round(r.trust*0.7+vTrust*0.3):Math.max(12,r.trust-18),
        mod:r.mod, totals:r.totals, words:r.words, overclaim:r.overclaim, vm,
        answers:S.iv.answers.slice(), at:new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})};
      S.booked.add(S.portal);}
    else S.iv.q++;
    return render();}
  if(e.target.id==='ivRetake'){delete S.liveCalls[S.portal]; S.iv={on:false,q:0,answers:[],done:false}; return render();}
  if(e.target.id==='ivReset'){S.iv={on:true,q:0,answers:[],done:false}; V.n=0;V.lit=0;V.motion=0;V.present=0;V.samples=[];
    render(); ivCamera(); ivListen(true); return;}
  if(e.target.id==='ivShow'){S.iv.show=!S.iv.show; return render();}
  if(e.target.id==='ivToVC'){S.view='deal'; S.sel=S.portal; S.tab='call'; window.scrollTo(0,0); return render();}
  const bk=e.target.closest('[data-book]'); if(bk){S.booked.add(bk.dataset.book); return render();}
  const rq=e.target.closest('[data-req]'); if(rq){S.requested.add(rq.dataset.req); return render();}
  const sb=e.target.closest('[data-sub]'); if(sb){S.submitted.add(sb.dataset.sub); S.requested.delete(sb.dataset.sub); return render();}
  if(e.target.id==='copymemo'){navigator.clipboard?.writeText(document.querySelector('.memo').innerText);
    e.target.textContent='Copied'; setTimeout(()=>e.target.textContent='Copy memo',1400); return;}
  if(e.target.id==='copymsg'){const t=document.getElementById('msg'); t.select(); navigator.clipboard?.writeText(t.value);
    e.target.textContent='Copied'; setTimeout(()=>e.target.textContent='Copy',1400); return;}
  if(e.target.id==='submitProfile'){e.target.textContent='Submitted — you will hear back within 24 hours';
    e.target.disabled=true; return;}
  if(e.target.id==='logapp'){e.target.textContent='Logged — joins the same screening funnel'; e.target.disabled=true; return;}
});
document.addEventListener('input', e=>{
  if(e.target.id==='q'){S.q=e.target.value; const p=e.target.selectionStart; render();
    const n=document.getElementById('q'); n.focus(); n.setSelectionRange(p,p);}
  if(e.target.id==='ivAns'){S.iv.answers[S.iv.q]=e.target.value; return;}
  const pf=e.target.closest('[data-p]'); if(pf){S.profile[pf.dataset.p]=pf.value;
    const k=pf.dataset.p, ss=pf.selectionStart; render();
    const n=document.querySelector(`[data-p="${k}"]`); if(n){n.focus(); try{n.setSelectionRange(ss,ss)}catch(_){}}
    return;}
  if(e.target.id==='minF'){S.thesis.minFounder=+e.target.value; render(); document.getElementById('minF')?.focus();}
  if(e.target.id==='maxC'){S.thesis.maxCap=+e.target.value; render(); document.getElementById('maxC')?.focus();}
});
document.addEventListener('change', e=>{
  if(e.target.id==='ftok'){S.thesis.firstTimeOK=e.target.checked; render();}
  if(e.target.id==='cmpA'){S.cmpA=e.target.value; render();}
  if(e.target.id==='cmpB'){S.cmpB=e.target.value; render();}
  if(e.target.id==='who'){S.portal=e.target.value; render();}
  if(e.target.id==='quick'&&e.target.value){S.q=e.target.value; render();}
});
render();
</script>
</body>
</html>
